trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    node app.js &
  displayName: 'Run app test'

- script: |
    docker build -t devops-app .
  displayName: 'Build Docker Image'